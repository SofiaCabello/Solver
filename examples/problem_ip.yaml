problem:
  objective:
    sense: max
    coefficients: [5, 3]
  constraints:
    - coefficients: [1, 1]
      sense: <=
      rhs: 5
    - coefficients: [15000, 10000]
      sense: <=
      rhs: 50000

config:
  is_integer: true
  integer_indices: [0, 1]
  max_nodes: 5000
  diving_max_depth: 10
  use_rounding_heuristic: true
  rounding_max_repair_steps: 100
