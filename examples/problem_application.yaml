problem:
  objective:
    sense: max
    coefficients: [5, 5, 5, 8, 8, 8]
  constraints:
    # 1. 每月工时约束 (Month 1, 2, 3 Labor limits)
    - coefficients: [20, 0, 0, 35, 0, 0]
      sense: <=
      rhs: 800
    - coefficients: [0, 20, 0, 0, 35, 0]
      sense: <=
      rhs: 800
    - coefficients: [0, 0, 20, 0, 0, 35]
      sense: <=
      rhs: 800
      
    # 2. 核心零部件总数约束 (Total controllers available)
    - coefficients: [1, 1, 1, 1, 1, 1]
      sense: <=
      rhs: 100
      
    # 3. 每月标准型需求上限 (Standard arm max monthly demand)
    - coefficients: [1, 0, 0, 0, 0, 0]
      sense: <=
      rhs: 30
    - coefficients: [0, 1, 0, 0, 0, 0]
      sense: <=
      rhs: 30
    - coefficients: [0, 0, 1, 0, 0, 0]
      sense: <=
      rhs: 30
      
    # 4. 每月高级型需求上限 (Advanced arm max monthly demand)
    - coefficients: [0, 0, 0, 1, 0, 0]
      sense: <=
      rhs: 20
    - coefficients: [0, 0, 0, 0, 1, 0]
      sense: <=
      rhs: 20
    - coefficients: [0, 0, 0, 0, 0, 1]
      sense: <=
      rhs: 20

config:
  is_integer: true
  integer_indices: [0, 1, 2, 3, 4, 5]
  max_nodes: 10000
  use_rounding_heuristic: true
  use_gomory_cuts: true
  max_gomory_cuts_per_node: 3
  visualize: false # 建议关闭，6维空间无法生成2D可视化 GIF
  visualization_output: outputs/problem_ip_vis_bnb.gif
  visualization_timeline_output: outputs/problem_ip_vis_timeline.png
  visualization_generate_timeline: false
  visualization_timeline_panels: 5
  visualization_fps: 1
  visualization_grid_size: 180